name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Push to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v2

      - name: executing remote ssh commands using private key
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 13.53.126.242
          username: ubuntu
          key: ${{ secrets.PRIVATE_SSH_KEY_GITHUB_ACTIONS }}
          port: 22
          script: |
            cd learning_devops_ci_cd
            git pull origin main
            npm install
            pm2 restart sum-server || pm2 start index.js --name "sum-server"